# Automātiski piemēro jaunas SQL migrācijas uz Supabase pēc push uz main.
name: Supabase DB migrations

on:
  push:
    branches: [main, master]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Instalē Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.12
        continue-on-error: true
        id: supabase_cli_setup

      - name: Instalē Supabase CLI (rezerves ceļš)
        if: steps.supabase_cli_setup.outcome != 'success'
        run: npm install -g supabase@2.20.12

      - name: Pārbauda priekšnosacījumus
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Trūkst SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF vai SUPABASE_DB_PASSWORD — migrācijas deploy izlaists."
            echo "skip_push=true" >> "$GITHUB_ENV"
          else
            echo "skip_push=false" >> "$GITHUB_ENV"
          fi

      - name: Piemēro migrācijas (db push)
        if: env.skip_push == 'false'
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push
