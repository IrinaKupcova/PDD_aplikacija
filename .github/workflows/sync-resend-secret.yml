# Tikai Resend atslēgas sinhronizācija uz Supabase (bez funkciju deploy).
# Palaid: Actions → Sync Resend secret → Run workflow
name: Sync Resend secret

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: 2.20.12

      - name: Pārbauda priekšnosacījumus
        run: |
          missing=0
          for v in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF RESEND_API_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Trūkst GitHub secret: $v"
              missing=1
            fi
          done
          exit $missing

      - name: Uzliek RESEND_API_KEY (+ RESEND_FROM) Supabase Edge
        run: |
          KEY="$(printf '%s' "$RESEND_API_KEY" | tr -d '\r\n\uFEFF' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')"
          if [ -z "$KEY" ]; then
            echo "::error::RESEND_API_KEY ir tukša pēc tīrīšanas"
            exit 1
          fi
          echo "Atslēgas garums: ${#KEY} (sākas ar ${KEY:0:3}...)"
          if [ -n "$RESEND_FROM" ]; then
            FROM="$(printf '%s' "$RESEND_FROM" | tr -d '\r\n\uFEFF' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')"
            supabase secrets set --project-ref "$SUPABASE_PROJECT_REF" RESEND_API_KEY="$KEY" RESEND_FROM="$FROM"
          else
            supabase secrets set --project-ref "$SUPABASE_PROJECT_REF" RESEND_API_KEY="$KEY"
          fi
          echo "::notice::Secrets ielikti. Pārbaudi ar PDD_DIAGNOSE_EMAIL() pārlūkā."
