# Automātiski: Resend secrets + Edge Functions deploy uz Supabase.
# Secrets (GitHub → Settings → Secrets → Actions) — opcionāli, ja vēlies automātisku sūtīšanu:
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, RESEND_API_KEY, RESEND_FROM
name: Supabase Edge — sendEmail + Resend

on:
  push:
    branches: [main, master]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/supabase-edge-email.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ secrets.RESEND_FROM }}
    steps:
      - uses: actions/checkout@v4

      # Fiksēta versija — "latest" bieži krīt ar Gateway Time-out.
      - name: Instalē Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.12
        continue-on-error: true
        id: supabase_cli_setup

      - name: Instalē Supabase CLI (rezerves ceļš)
        if: steps.supabase_cli_setup.outcome != 'success'
        run: npm install -g supabase@2.20.12

      - name: Pārbauda Supabase CLI
        run: supabase --version

      - name: Pārbauda deploy priekšnosacījumus
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::warning::Trūkst SUPABASE_ACCESS_TOKEN vai SUPABASE_PROJECT_REF — deploy izlaists."
            echo "skip_deploy=true" >> "$GITHUB_ENV"
          else
            echo "skip_deploy=false" >> "$GITHUB_ENV"
          fi

      - name: Resend secrets uz Supabase Edge (opcionāli)
        if: env.skip_deploy == 'false'
        continue-on-error: true
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::notice::RESEND_API_KEY nav — automātiskie e-pasti nestrādās."
            exit 0
          fi
          KEY="$(printf '%s' "$RESEND_API_KEY" | tr -d '\r\n\uFEFF' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')"
          FROM="$(printf '%s' "${RESEND_FROM:-PDD <prombutnes@vid.gov.lv>}" | tr -d '\r\n\uFEFF' | sed 's/^[[:space:]"]*//;s/[[:space:]"]*$//')"
          supabase secrets set --project-ref "$SUPABASE_PROJECT_REF" RESEND_API_KEY="$KEY" RESEND_FROM="$FROM"

      - name: Deploy sendIadEmail (--no-verify-jwt)
        if: env.skip_deploy == 'false'
        continue-on-error: true
        run: supabase functions deploy sendIadEmail --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy sendEmail (--no-verify-jwt)
        if: env.skip_deploy == 'false'
        continue-on-error: true
        run: supabase functions deploy sendEmail --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
