<!DOCTYPE html>
<html lang="lv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDD — Procesu vadība</title>
    <style>
      html, body { margin: 0; min-height: 100%; background: #e8f8f3; font-family: "Segoe UI", system-ui, sans-serif; }
      #root { min-height: 100vh; }
      .pv-boot-error {
        max-width: 520px; margin: 2rem auto; padding: 1.25rem 1.5rem;
        background: #fff; border: 1px solid #f87171; border-radius: 12px; color: #7f1d1d;
      }
      .pv-boot-error h1 { margin: 0 0 0.5rem; font-size: 1.1rem; }
      .pv-boot-error p { margin: 0.35rem 0; font-size: 0.92rem; line-height: 1.45; }
    </style>
    <script defer src="./Komanda.js?v=202606182"></script>
    <script defer src="./ProcesuVadiba.js?v=202606216"></script>
  </head>
  <body>
    <div id="root"><p style="padding:1.25rem;color:#1f4d47;margin:0">Ielādē Procesu vadību…</p></div>
    <script type="module">
      import React from "https://esm.sh/react@19.0.0";
      import { createRoot } from "https://esm.sh/react-dom@19.0.0/client";
      import htm from "https://esm.sh/htm@3.1.1";

      const html = htm.bind(React.createElement);
      const rootEl = document.getElementById("root");

      function showBootError(msg) {
        rootEl.innerHTML = `<div class="pv-boot-error"><h1>Procesu vadība nav ielādēta</h1><p>${msg}</p><p>Pārlādē ar Ctrl+F5.</p></div>`;
      }

      class PvBootErrorBoundary extends React.Component {
        constructor(props) {
          super(props);
          this.state = { error: null };
        }
        static getDerivedStateFromError(error) {
          return { error };
        }
        render() {
          if (this.state.error) {
            return html`<div class="pv-boot-error">
              <h1>Procesu vadības kļūda</h1>
              <p>${String(this.state.error?.message || this.state.error)}</p>
            </div>`;
          }
          return this.props.children;
        }
      }

      function boot() {
        const api = globalThis.PDD_PROCESU_VADIBA;
        if (!api?.createProcesuVadibaModule) return false;
        try {
          const Panel = api.createProcesuVadibaModule(html, React);
          createRoot(rootEl).render(
            React.createElement(PvBootErrorBoundary, null, React.createElement(Panel)),
          );
          console.info("[procesu-vadiba.html] modulis ielādēts");
          return true;
        } catch (e) {
          console.error("[procesu-vadiba.html]", e);
          showBootError(String(e?.message || e));
          return true;
        }
      }

      function waitBoot(tries = 0) {
        if (boot()) return;
        if (tries > 100) {
          showBootError("ProcesuVadiba.js nav ielādējies. Pārlādē ar Ctrl+F5.");
          return;
        }
        setTimeout(() => waitBoot(tries + 1), 100);
      }

      if (document.readyState === "complete") waitBoot();
      else window.addEventListener("load", () => waitBoot(), { once: true });
    </script>
  </body>
</html>
